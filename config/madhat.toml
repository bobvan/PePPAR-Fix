[peppar]
# F9T EVKs share one USB descriptor (no unique serial), so udev can't
# make a stable name and /dev/ttyACMx is fragile (enumeration shifts
# when any USB device is added/removed).  Bind to the physical USB
# port via /dev/serial/by-path — only breaks if the F9T's USB cable
# is moved to a different port.  See docs/lab-operations.md §12.
serial = "/dev/serial/by-path/platform-xhci-hcd.1-usb-0:1:1.0"
baud = 115200
ubx_port = "USB"
receiver = "f9t-l5"
ptp_profile = "i226"
ptp_dev = "/dev/ptp_i226"
ntrip_conf = "ntrip.conf"
eph_mount = "BCEP00BKG0"
# CNES SSR for PPP-AR (credentials in ntrip-cnes.conf)
ssr_ntrip_conf = "ntrip-cnes.conf"
# 2026-05-01 morning: BDS-off A/B test (I-133619-main P1).  CNES has
# no SSR phase-bias coverage for BDS B2a-I; tracking it on TIM 2.25
# leaves the cross-SV mean of the missing-PB error to land in
# position (now blocked by NAV2 anchor) or ZTD (now the trip source,
# 4.76 trips/hr overnight).  TimeHat (TIM 2.20, no native B2a-I)
# stays on gps,gal,bds as the control — it was at 2.82 trips/hr.
# If MadHat's rate drops toward TimeHat's, BDS-as-cause confirmed
# and afternoon plan is WHU OSBC00WHU1 mount swap (P2).
systems = "gps,gal"

# TICC #2: chA = PEROUT (i226 PPS OUT), chB = GNSS PPS.
ticc_port = "/dev/ticc2"
