[peppar]
# F9T EVKs share one USB descriptor (no unique serial), so udev can't
# make a stable name and /dev/ttyACMx is fragile (enumeration shifts
# when any USB device is added/removed).  Bind to the physical USB
# port via /dev/serial/by-path — only breaks if the F9T's USB cable
# is moved to a different port.  See docs/lab-operations.md §12.
serial = "/dev/serial/by-path/platform-xhci-hcd.1-usb-0:1:1.0"
baud = 115200
ubx_port = "USB"
receiver = "f9t-l5"
ptp_profile = "i226"
ptp_dev = "/dev/ptp_i226"
ntrip_conf = "ntrip.conf"
eph_mount = "BCEP00BKG0"
# Dual-mount SSR (I-133619-main P2, 2026-05-01 afternoon):
#   orbit/clock + GAL phase biases + GPS L2W code biases:  CNES SSRA00CNE0
#   per-(SV,signal) phase biases incl. BDS B2a-I + GPS L5Q: WHU OSBC00WHU1
# Both mounts on products.igs-ip.net (same caster, same login —
# ntrip-cnes.conf credentials cover both).
# Restores BDS B2a-I + GPS L5Q phase-bias coverage that CNES alone
# leaves as gaps; this morning's BDS-off A/B confirmed the gap as
# the dominant ZTD-bias source (MadHat ZTD went from -1500mm
# stuck-bias overnight to +242mm sane).  WHU mount expected to keep
# ZTD healthy AND restore the dropped SVs for full geometry.
# See docs/ssr-mount-survey.md and commit 7ae1392.
ssr_ntrip_conf = "ntrip-cnes.conf"
ssr_bias_mount = "OSBC00WHU1"
ssr_bias_ntrip_conf = "ntrip-cnes.conf"
systems = "gps,gal,bds"

# TICC #2: chA = PEROUT (i226 PPS OUT), chB = GNSS PPS.
ticc_port = "/dev/ticc2"
