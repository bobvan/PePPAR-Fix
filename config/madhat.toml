[peppar]
# F9T EVKs share one USB descriptor (no unique serial), so udev can't
# make a stable name and /dev/ttyACMx is fragile (enumeration shifts
# when any USB device is added/removed).  Bind to the physical USB
# port via /dev/serial/by-path — only breaks if the F9T's USB cable
# is moved to a different port.  See docs/lab-operations.md §12.
serial = "/dev/serial/by-path/platform-xhci-hcd.1-usb-0:1:1.0"
baud = 115200
ubx_port = "USB"
receiver = "f9t-l5"
ptp_profile = "i226"
ptp_dev = "/dev/ptp_i226"
ntrip_conf = "ntrip.conf"
eph_mount = "BCEP00BKG0"
# 2026-05-01 evening: revert to morning's known-good config
# (BDS-off, CNES-only) per I-003751-main.  WHU dual-mount tried
# this afternoon (commit 1124a0f) regressed badly — ZTD walked
# to -7m, WL fixing collapsed (2/31 fixed), trip rate 60/hr.
#
# 2026-05-02: BDS re-enabled here for I-122350-main P3 twin-WHU on
# UFO1 (Bob picked Opt A — match TimeHat's gps,gal,bds for the
# cleanest constellation-symmetric A/B).  The diagnostic framework
# now in place (Main P1 src_mount logging 87e5da3 + Bravo bias_diff
# 2603d71 + Charlie reference baseline) is what was missing
# yesterday; that's the regression defense, not BDS-off.
ssr_ntrip_conf = "ntrip-cnes.conf"
# Dual-mount WHU phase-bias capability — disabled by default (I-122350
# P2, 2026-05-02).  Uncomment the two ssr_bias_* lines below to bring
# in WHU OSBC00WHU1 alongside CNES SSRA00CNE0.  Both mounts live on
# products.igs-ip.net under the same login, so ntrip-cnes.conf covers
# both.
#
# Asymmetric-hardware role: MadHat (TIM 2.25) tracks the full L5/B2a-I
# fleet — the *gap-signal* leg.  Enabling WHU here exercises the
# bias-application path on signals CNES doesn't publish (GPS L5Q phase
# bias + BDS B2a-I phase bias).  Any regression here isolates a
# gap-signal bug rather than a dual-mount merge bug (the TimeHat
# (TIM 2.20) leg covers shared-only signals).  See I-122350-main
# 'useful asymmetry' framing + I-003751-main stepwise plan.
#
# This is the host that suffered yesterday's WHU regression (1124a0f,
# reverted in ef49574).  Re-enable here only after Main's P1 per-SV
# per-signal bias logging (commit 87e5da3 onwards) is in place +
# Charlie's TimeHat-CNES reference baseline is captured (done
# 2026-05-02 ~10:09 CDT, snapshot at TimeHat:~/peppar-fix/data/
# day0502-baseline-reference/).  bias_diff overlay (commit 2603d71)
# consumes the new src= field for the twin-WHU diff.
ssr_bias_mount      = "OSBC00WHU1"
ssr_bias_ntrip_conf = "ntrip-cnes.conf"

# BDS dropped 2026-05-09 per I-165118-charlie research (immediate
# operational mitigation (a)): no AC on IGS-IP publishes BDS B2a-I
# phase biases.  CNES publishes only B1I/B3I/B2I-legacy phase biases;
# WHU publishes no BDS phase biases at all (60s/5min/15min probes
# all return RTCM 1059/1065/1242/1260/1265 — multi-GNSS code biases
# plus GPS phase only — never 1267 or 1270).  CHC publishes
# B1I + B2I-legacy; CAS publishes B1I + B1C; SHAO/GFZ/BKG publish
# none.  See docs/bds-b2a-phase-bias-survey-2026-05-09.md.
#
# F9T-20B tracks BDS B2a-I and reports under RINEX C5I/L5I.  Without
# a phase-bias source, BDS L5/B2a-I observations flow into the
# WL/MW/float math with bias=0, biasing each B2a-I-tracking SV by
# the unknown true phase-bias value (m-scale per SV).  4-7 BDS SVs
# per epoch on dual-freq fix → multi-meter position basin
# contamination.  Empirical case: day0509-madhat-coldstart.log
# (102 BDS [PB_APPLIED] emits with src=? on L5/B2a, +1146 mm ZTD
# residual smoking gun).
#
# Re-enable when one of:
#  - I-165118 Fix #2 (engine-side gate widening) lands and keeps
#    BDS B2a-I observations OUT of WL/float math when phase bias
#    is MISS, OR
#  - An AC publishes BDS B2a-I phase biases (track via re-probing
#    quarterly with scripts/probe_cas_ssr.py against IGS RTS mounts).
systems = "gps,gal"

# TICC #2: chA = PEROUT (i226 PPS OUT), chB = GNSS PPS.
ticc_port = "/dev/ticc2"


# RINEX archival for I-013307 daily PRIDE pipeline.
# Path templates {date} (UTC YYYYDDD) and {host}; {date} triggers
# UTC-midnight rotation.  Decimation to 30 s matches PRIDE/RTKLIB
# standard input; engine continues to consume RAWX at 1 Hz for its
# own PPP filter — decimation is writer-side only.
rinex_out = "data/rinex/{host}-{date}.obs"
rinex_decimate_s = 30.0
