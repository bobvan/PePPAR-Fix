[peppar]
# F9T EVKs share one USB descriptor (no unique serial), so udev can't
# make a stable name and /dev/ttyACMx is fragile (enumeration shifts
# when any USB device is added/removed).  Bind to the physical USB
# port via /dev/serial/by-path — only breaks if the F9T's USB cable
# is moved to a different port.  See docs/lab-operations.md §12.
serial = "/dev/serial/by-path/platform-fe9c0000.xhci-usb-0:1.2:1.0"
baud = 115200
ubx_port = "USB"
receiver = "f9t-l5"
# No ptp_dev — the engine does not use the CM4's PHC.
# ts2phc disciplines bcm_phy_ptp from DO PPS on SYNC_IN independently.
ntrip_conf = "ntrip.conf"
eph_mount = "BCEP00BKG0"
# CNES SSR for PPP-AR (credentials in ntrip-cnes.conf)
ssr_ntrip_conf = "ntrip-cnes.conf"

# BDS B2a-I phase biases are not published by any IGS-IP AC as of
# 2026-05-09 — see docs/bds-b2a-phase-bias-survey-2026-05-09.md.
# Per-filter MISS-bias gate routes BDS B2a-I correctly even without
# phase biases; BDS contributes to dt_rx without poisoning position.
systems = "gps,gal,bds"

# Operational ARP — engine reads timelab/antennas.json[ufo1] at
# startup as an in-memory survey-class seed candidate.  Read-only;
# only peppar-survey writes state/positions/<uid>.survey.toml.
# UFO1 restored 2026-05-19 (CHOKE1 swap-out); see antennas.json.
arp_label = "ufo1"

# IsoTemp OCXO via AD5693R DAC on I2C bus 1, 2× output mode.
#
# Empirical characterization 2026-05-16 by 3 independent runs of
# tools/calibrate_do.py + tools/calibrate_do_consensus.py:
#   data/clkpoc3-cal-2026-05-16-run{1,2,3}.json
#
# Results (median across 3 runs, 0.004% spread — PASS 1% target):
#   ppb_per_code     = +0.02309 ppb/code  (POSITIVE — higher code →
#                                          higher DO freq)
#   gain             = 1.0039  (commanded vs measured)
#   OCXO at center   = +17.75 ppb  (with 2× mode → Vctrl ≈ 2.5V at
#                                   code 32768, the IsoTemp's nominal
#                                   operating point)
#   Full range       = 1495 ppb  (half-range 747 ppb either way)
#   Linearity        = 9 ppb max residual from best-fit line
#
# 2× gain is REQUIRED for IsoTemp OCXO: part expects 0..5V Vctrl
# swing; AD5693R 1× mode only delivers 0..Vref = 0..2.5V which leaves
# the OCXO operating near the bottom of its pull range and ~10 ppb
# of headroom from rail (insufficient for thermal/aging drift).  2×
# mode delivers 0..2×Vref = 0..5V, centering the operating point
# and providing ~730 ppb of headroom either direction.
#
# History (pre-2026-05-16):
#   - Previous TOML had dac_ppb_per_code = "0.0361" (lifted from
#     PiFace's CTI characterization — wrong oscillator).  Sign was
#     correct; magnitude was 3.1× too large.  Engine commanded N ppb
#     but actuator delivered N × 0.32 ppb.  Servo wound up to
#     compensate, eventually railing at adj=+1183 ppb.
#   - Previous TOML omitted dac_gain — defaulted to 0 (1× mode),
#     incompatible with the IsoTemp's Vctrl spec, compounding the
#     rail-pinning issue.
#   - Closed: dayplan item dacPpbSignClean-main (I-010246).
do_label = "ocxo-clkpoc3"
do_type = "vcocxo"
dac_bus = 1
dac_addr = "0x4C"
dac_bits = 16
dac_ppb_per_code = "0.02309"
dac_max_ppb = 740.0
dac_type = "ad5693r"
dac_gain = 1

# TADD-2 Mini divider: ARM on GPIO 16, syncs 10 MHz → 1 PPS.
tadd_gpio = 16

# TICC #5: chA = DO PPS, chB = GNSS PPS.
# TICC competes as a servo source whenever ticc_port is configured.
ticc_port = "/dev/ticc5"

# RINEX archival for offline PRIDE comparison + peppar-survey --pride.
# Decimation to 30 s matches PRIDE/RTKLIB standard input; engine
# continues to consume RAWX at 1 Hz for its own PPP filter.
rinex_out = "data/rinex/{host}-{date}.obs"
rinex_decimate_s = 30.0
