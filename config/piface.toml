[peppar]
# F9T EVKs share one USB descriptor (no unique serial), so udev can't
# make a stable name and /dev/ttyACMx is fragile (enumeration shifts
# when any USB device is added/removed).  Bind to the physical USB
# port via /dev/serial/by-path — only breaks if the F9T's USB cable
# is moved to a different port.  See docs/lab-operations.md §12.
serial = "/dev/serial/by-path/platform-xhci-hcd.1-usb-0:2:1.0"
baud = 115200
ubx_port = "USB"
receiver = "f9t-l5"
# No ptp_dev — the engine does not use the CM4's PHC.
# ts2phc disciplines bcm_phy_ptp from DO PPS on SYNC_IN independently.
ntrip_conf = "ntrip.conf"
eph_mount = "BCEP00BKG0"
# CNES SSR for PPP-AR (credentials in ntrip-cnes.conf)
ssr_ntrip_conf = "ntrip-cnes.conf"
systems = "gps,gal,bds"

# Operational ARP — engine reads timelab/antennas.json[choke1] at
# startup as an in-memory survey-class seed candidate.  Read-only;
# only peppar-survey writes state/positions/<uid>.survey.toml.
arp_label = "choke1"

# CTI OSC5A2B02 OCXO via AD5693R DAC on I2C bus 1, 1× output mode.
#
# Empirical characterization 2026-05-16 by 3 independent runs of
# tools/calibrate_do.py + tools/calibrate_do_consensus.py:
#   data/piface-cal-2026-05-16-run{1,2,3}.json
#
# Results (median across 3 runs, 0.001% spread — PASS 1% target):
#   ppb_per_code     = +0.03463 ppb/code  (POSITIVE — higher code →
#                                          higher DO freq)
#   gain             = 0.9592  (commanded vs measured, was 1.062 in
#                               the 2026-04-14 characterization —
#                               drift of ~10% over a month)
#   OCXO at center   = -78.6 ppb  (was -149 per 2026-04-14 — OCXO
#                                  has aged toward +freq by ~70 ppb)
#   Full range       = 2215 ppb  (half-range 1108 ppb either way)
#   Linearity        = 117 ppb max residual from best-fit line
#                      (less linear than IsoTemp at extreme rails;
#                      central-region linearity better — investigate
#                      but doesn't block deploy)
#
# 1× gain is correct for CTI OSC5A2B02: part operates within 0..2.5V
# Vctrl range, and 1× mode (0..Vref ≈ 0..2.5V) matches.  Sign verified
# (positive ppb_per_code matches DAC convention "higher code = higher
# freq").
do_label = "ocxo-piface"
do_type = "vcocxo"
dac_bus = 1
dac_addr = "0x4C"
dac_bits = 16
dac_ppb_per_code = "0.03463"
dac_max_ppb = 1096.0
dac_type = "ad5693r"

# TADD-2 Mini divider: ARM on GPIO 16, syncs 10 MHz → 1 PPS.
tadd_gpio = 16

# TICC #3: chA = DO PPS, chB = GNSS PPS.
# TICC competes as a servo source whenever ticc_port is configured.
ticc_port = "/dev/ticc3"

# RINEX archival for offline PRIDE comparison + peppar-survey --pride.
# Decimation to 30 s matches PRIDE/RTKLIB standard input; engine
# continues to consume RAWX at 1 Hz for its own PPP filter.
rinex_out = "data/rinex/{host}-{date}.obs"
rinex_decimate_s = 30.0
