[peppar]
# F9T EVKs share one USB descriptor (no unique serial), so udev can't
# make a stable name and /dev/ttyACMx is fragile (enumeration shifts
# when any USB device is added/removed).  Bind to the physical USB
# port via /dev/serial/by-path — only breaks if the F9T's USB cable
# is moved to a different port.  See docs/lab-operations.md §12.
serial = "/dev/serial/by-path/platform-xhci-hcd.1-usb-0:2:1.0"
baud = 115200
ubx_port = "USB"
receiver = "f9t-l5"
ptp_profile = "i226"
ptp_dev = "/dev/ptp_i226"
ntrip_conf = "ntrip.conf"
eph_mount = "BCEP00BKG0"
# CNES SSR for PPP-AR: GAL fully matched (L1C/L5Q), GPS works via
# L5I/L5Q shared carrier.  Credentials in ntrip-cnes.conf (not in repo).
ssr_ntrip_conf = "ntrip-cnes.conf"
# Dual-mount WHU phase-bias capability — disabled by default (I-122350
# P2, 2026-05-02).  Uncomment the two ssr_bias_* lines below to bring
# in WHU OSBC00WHU1 alongside CNES SSRA00CNE0.  Both mounts live on
# products.igs-ip.net under the same login, so ntrip-cnes.conf covers
# both.
#
# Asymmetric-hardware role: TimeHat (TIM 2.20, no L5/B2a-I) only
# tracks signals that CNES already covers.  Enabling WHU here
# exercises the dual-mount merge path on shared-only signals — any
# regression isolates a merge bug rather than a gap-signal bug (the
# MadHat (TIM 2.25) leg covers gap signals).  See I-122350-main
# 'useful asymmetry' framing + I-003751-main stepwise plan.
#
# Yesterday's MadHat WHU run (commit e4627d7, reverted in ef49574)
# regressed: ZTD walked to -7m, WL fixing collapsed (2/31), trip rate
# 60/hr.  Re-enable here only after Main's P1 per-SV per-signal bias
# logging (commit 87e5da3 onwards) is in place — bias-value logs are
# the diagnostic backbone for the bisect in P3+P4 of I-122350-main.
ssr_bias_mount      = "OSBC00WHU1"
ssr_bias_ntrip_conf = "ntrip-cnes.conf"
systems = "gps,gal"

# Operational ARP — engine reads timelab/antennas.json[choke1] at
# startup as an in-memory survey-class seed candidate so the PPP
# filter seeds at survey truth (σ ≈ 12 mm OPUS) instead of NAV2
# (~2 m biased).  The antennas.json read is in-memory only; only
# peppar-survey writes state/positions/<uid>.survey.toml.  Single
# source of truth: timelab/antennas.json.  See CLAUDE.md
# "Authoritative ARP" section.
arp_label = "choke1"

phase_step_bias_ns = 2283.0

# DO characterization: i226 internal TCXO via PHC adjfine
#
# Empirical characterization 2026-05-17 by 3 independent runs of
# tools/calibrate_do.py + tools/calibrate_do_consensus.py:
#   gt:peppar-fix-data/calibrations/timehat-cal-2026-05-17-run{1,2,3}.json
#
# Sweep: ±500 ppb × 7 steps × 60 s dwell, --ref-channel chB (F9T PPS).
# Prerequisite: rmmod igc; modprobe igc (multi-day igc uptime wedges
# PEROUT + EXTTS — see calToolPhcPerout-main empirical close and
# igcReloadOnPhcInitFailure-main).
#
# Results (median across 3 runs):
#   gain         = 0.99970 measured/commanded (spread 0.51%, PASS ≤1%)
#   offset       = -40.96 ppb at adj=0  (TCXO is ~41 ppb slow vs GPS;
#                                        sign-consistent with engine
#                                        steady-state adj=+42.9 ppb
#                                        from state/dos/_dev_ptp_i226.json)
#   range tested = 1000.5 ppb (spread 0.59%, PASS ≤1%)
#   linearity    = ≤2.5 ppb max residual from best-fit line
#   resolution   = 0.0153 ppb/step = 1/65536 ppm (i226 hardware spec)
#
# No active toml fields change: PHC adjfine is a hardware-defined
# actuator with no dac_ppb_per_code / dac_max_ppb to tune.  Cal
# confirms PHC behaves to spec; gain ≈ 1.000 means engine commands
# are delivered as-is to within 0.5%.

# TICC #1: chA = PEROUT (i226 PPS OUT), chB = GNSS PPS.
ticc_port = "/dev/ticc1"

ticc_landing_horizon_s = 6.0
ticc_settled_threshold_ns = 150.0
ticc_settled_deadband_ns = 75.0
ticc_settled_count = 3
